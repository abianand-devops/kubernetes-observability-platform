apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: high-cpu-alert
  namespace: monitoring
spec:
  groups:
  - name: example-alert
    rules:
    - alert: HighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{namespace="prod",container!=""}[1m])) > 0.01
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage detected in prod namespace"
        description: "CPU usage is higher than expected."