apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: instant-test-alert
  namespace: monitoring
spec:
  groups:
  - name: test-alerts
    rules:
    - alert: TestImmediateAlert
      expr: vector(1)
      for: 10s
      labels:
        severity: critical
      annotations:
        summary: "Test alert firing"
        description: "This alert fires immediately to test webhook routing"